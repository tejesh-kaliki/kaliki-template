# Profile: jwt-basic
#
# Smallest profile that exercises authentication. Signup + login only (no invite,
# no password reset, no mailer, no verification flow). Guards the jwt-basic file
# set, which is a distinct subset of jwt-full — easy to break when the two auth
# modes share templated files.
meta:
  title: "JWT basic (signup + login)"
  purpose: "Guards the jwt-basic auth path: JWT issue/verify without verification or refresh-token machinery."
  guards:
    - "auth=jwt-basic (jwt.go + service.go, but NO service_tokens.go)"
    - "mailer/verification_method absent (gated behind auth=jwt-full)"
    - "example domain present alongside auth (sqlc generates both)"
  validates: [go build, go vet, go test, flutter analyze, flutter test]

answers:
  project_name: "JWT Basic App"
  include_frontend: true
  include_example_domain: true
  auth: jwt-basic
  caching: redis
  eventing: none
  payments: none
  push_notifications: none
  object_storage: none
  agent_tooling: true
