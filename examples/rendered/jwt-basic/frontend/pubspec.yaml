name: jwt_basic_app
description: JWT Basic App Flutter app
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.0.0
  dio: ^5.4.0
  flutter_secure_storage: ^9.2.2
  shared_api_client:
    path: ../packages/shared_api_client

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.0
  riverpod_generator: ^2.4.0
  # `flutter create` writes an analysis_options.yaml that includes this ruleset.
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
