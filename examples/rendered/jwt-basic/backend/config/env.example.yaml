server:
  port: "8080"

database:
  # Overridden by DATABASE_URL in docker-compose.
  url: "postgres://postgres:postgres@localhost:5432/jwt_basic_app?sslmode=disable"

observability:
  service_name: "jwt-basic-app-backend"
  # Leave empty for the no-op tracer. Set to an OTLP/gRPC collector "host:port"
  # (or OTEL_EXPORTER_OTLP_ENDPOINT) to export traces.
  endpoint: ""

token:
  # Overridden by JWT_SECRET in docker-compose. Change this in production.
  secret: "dev-insecure-change-me"
  expiry_hours: 1           # access token TTL (short; clients refresh)
  refresh_expiry_hours: 720 # refresh token TTL (30 days)

redis:
  # Overridden by REDIS_URL in docker-compose.
  url: "redis://localhost:6379"
