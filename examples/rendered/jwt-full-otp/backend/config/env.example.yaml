server:
  port: "8080"

database:
  # Overridden by DATABASE_URL in docker-compose.
  url: "postgres://postgres:postgres@localhost:5432/jwt_full_otp_app?sslmode=disable"

observability:
  service_name: "jwt-full-otp-app-backend"
  # Leave empty for the no-op tracer. Set to an OTLP/gRPC collector "host:port"
  # (or OTEL_EXPORTER_OTLP_ENDPOINT) to export traces.
  endpoint: ""

token:
  # Overridden by JWT_SECRET in docker-compose. Change this in production.
  secret: "dev-insecure-change-me"
  expiry_hours: 1           # access token TTL (short; clients refresh)
  refresh_expiry_hours: 720 # refresh token TTL (30 days)

mail:
  # provider: smtp | ses | (empty -> log transport; prints emails to stdout).
  provider: "smtp" # local default; set MAIL_PROVIDER=ses in production
  sender_address: "no-reply@example.com"
  sender_name: "JWT Full OTP App"
  app_name: "JWT Full OTP App"
  base_url: "http://localhost:8080" # used to build links (token method)
  smtp:
    # Local default points at Mailpit (docker-compose). No auth locally.
    host: "localhost"
    port: 1025
    username: ""
    password: ""
  ses:
    region: "us-east-1" # set via SES_REGION / falls back to AWS default chain
    access_key_id: ""
    secret_access_key: ""

redis:
  # Overridden by REDIS_URL in docker-compose.
  url: "redis://localhost:6379"
