name: template-ci

# Renders the template across representative flag combinations and verifies each
# generated project builds and tests green. Combinatorial templates rot without
# this — it is the safety net for adding modules.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  render-and-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: minimal
            flags: "-d auth=none -d include_example_domain=false -d include_frontend=false -d caching=none"
          - name: default
            flags: ""
          - name: basic
            flags: "-d auth=jwt-basic"
          - name: token_mail
            flags: "-d verification_method=token"
          - name: full
            flags: "-d eventing=kafka-redpanda -d payments=razorpay -d push_notifications=firebase -d object_storage=s3"
    name: ${{ matrix.name }}
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 25432:5432
        options: >-
          --health-cmd "pg_isready -U test_user"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      TEST_DATABASE_URL: postgres://test_user:test_password@localhost:25432/test_db?sslmode=disable
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # The Flutter SDK (which bundles Dart) is needed for the frontend post-gen
      # tasks: API client generation, `flutter create`, and build_runner.
      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - uses: astral-sh/setup-uv@v5

      # Renders the project and runs all post-gen tasks (codegen, API spec build,
      # and — when the frontend is included — the Flutter build steps).
      - name: Render template (${{ matrix.name }})
        run: uvx copier copy --defaults --trust ${{ matrix.flags }} . out

      - name: Backend build + test
        working-directory: out/backend
        run: |
          go build ./...
          go test ./...

      - name: API spec build
        working-directory: out/api
        run: |
          npm install
          npm run build:local

      - name: Frontend analyze
        if: ${{ hashFiles(format('{0}/out/frontend/pubspec.yaml', github.workspace)) != '' }}
        working-directory: out/frontend
        run: flutter analyze
