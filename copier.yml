_subdirectory: template
_templates_suffix: .jinja
_envops:
  keep_trailing_newline: true

# Hidden toggle (never prompted; `when: false`). Set via `-d _skip_tasks=true` to
# render a pure template expansion with no post-generation tasks — used by
# scripts/render-examples.sh to produce the deterministic, committed snapshots in
# examples/rendered/. Full post-task builds are validated separately.
_skip_tasks:
  type: bool
  default: false
  when: false

# Post-generation: run codegen, then resolve the Go module graph so `go.sum`
# exists and the Docker build is reproducible. Requires Go on the host (the
# template targets Go devs). Codegen tools are fetched via `go run`.
# Building the API spec needs Node/npm; the frontend steps need the Flutter SDK
# (which bundles Dart). Those run only when the relevant pieces are generated.
_tasks:
  # Local dev config: server reads backend/config/env.yaml (gitignored). Seed it
  # from the committed example so `go run ./cmd/server` works out of the box.
  - command: "cp config/env.example.yaml config/env.yaml"
    working_directory: "backend"
  - command: "go run github.com/sqlc-dev/sqlc/cmd/sqlc@v1.27.0 generate"
    working_directory: "backend"
    when: "{{ (include_example_domain or auth != 'none') and not _skip_tasks }}"
  - command: >-
      for d in gen/api/*/; do [ -e "$d/codegen.yaml" ] || continue;
      name=$(basename "$d");
      (cd "$d" && go run github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@v2.4.1
      --config=codegen.yaml "../../../../api/services/$name.yaml"); done
    working_directory: "backend"
    when: "{{ not _skip_tasks }}"
  - command: "go mod tidy"
    working_directory: "backend"
    when: "{{ not _skip_tasks }}"
  # Build the combined OpenAPI spec (api/openapi.yaml). Needed on its own when
  # there is no frontend; the frontend script below rebuilds it otherwise.
  - command: "npm install && npm run build:local"
    working_directory: "api"
    when: "{{ not include_frontend and not _skip_tasks }}"
  # Frontend: build the spec + generate the Dart API client, scaffold the
  # platform folders, then resolve deps and run build_runner for the .g.dart
  # files. Leaves the Flutter app ready to `flutter run`.
  - command: "bash scripts/regenerate-api-client.sh"
    when: "{{ include_frontend and not _skip_tasks }}"
  - command: "flutter create --project-name {{ project_slug | replace('-', '_') }} --org {{ app_bundle_id.rsplit('.', 1)[0] }} . && rm -f test/widget_test.dart"
    working_directory: "frontend"
    when: "{{ include_frontend and not _skip_tasks }}"
  - command: "flutter pub get && dart run build_runner build --delete-conflicting-outputs"
    working_directory: "frontend"
    when: "{{ include_frontend and not _skip_tasks }}"

_message_after_copy: |
  Project "{{ project_name }}" generated.

  Next steps:
    cd {{ project_slug }}
    cp .env.example .env
    docker compose up --build        # backend + postgres + redis{% if auth == 'jwt-full' and mailer %} + mailpit{% endif %}
    curl localhost:8080/health
  {% if auth == 'jwt-full' and mailer %}
  Verification / password-reset emails are captured by Mailpit:
    open http://localhost:8025
  {% endif %}
  Delete the example domain once you've copied its pattern:
    see TEMPLATE_NOTES.md  ->  "Removing the example domain"

# ─── Identity ────────────────────────────────────────────────────────────────
project_name:
  type: str
  help: Human-readable project name
  default: My App

project_slug:
  type: str
  help: Directory / package slug (kebab-case)
  default: "{{ project_name | lower | replace(' ', '-') | replace('_', '-') }}"

go_module_path:
  type: str
  help: Go module path for the backend (e.g. github.com/org/app/backend)
  default: "github.com/example/{{ project_slug }}/backend"

org_domain:
  type: str
  help: Organization domain (used for bundle ids, image names)
  default: example.com

app_bundle_id:
  type: str
  help: Reverse-DNS bundle id for the Flutter app
  default: "{{ org_domain.split('.') | reverse | join('.') }}.{{ project_slug | replace('-', '') }}"

db_name:
  type: str
  help: Postgres database name
  default: "{{ project_slug | replace('-', '_') }}"

# ─── App composition ─────────────────────────────────────────────────────────
include_frontend:
  type: bool
  help: Generate the primary Flutter app
  default: true

include_example_domain:
  type: bool
  help: "Generate the disposable 'items' example domain (full vertical slice)"
  default: true

# ─── Backend modules ─────────────────────────────────────────────────────────
auth:
  type: str
  help: Authentication module
  choices:
    "None": none
    "JWT (signup + login)": jwt-basic
    "JWT full (invite + password reset)": jwt-full
  default: jwt-full

# Real transactional email transports (SMTP + SES) for verification + password
# reset, plus Mailpit in the local stack. When false, the mail package is still
# generated but only with the log transport: credentials are written to the
# server log and NEVER returned in the API response. Switching this flag never
# leaks tokens to clients.
mailer:
  type: bool
  help: Real email transports (SMTP -> Mailpit locally, SES in prod) + Mailpit
  default: true
  when: "{{ auth == 'jwt-full' }}"

verification_method:
  type: str
  help: How accounts verify email / reset password
  choices:
    "OTP code (6-digit, mobile-friendly)": otp
    "Token link (URL with embedded token)": token
  default: otp
  when: "{{ auth == 'jwt-full' }}"

caching:
  type: str
  help: Request-time caching layer
  choices:
    "None": none
    "Redis": redis
  default: redis

eventing:
  type: str
  help: Event publishing
  choices:
    "None": none
    "Kafka / Redpanda": kafka-redpanda
  default: none

payments:
  type: str
  choices:
    "None": none
    "Razorpay": razorpay
  default: none

push_notifications:
  type: str
  choices:
    "None": none
    "Firebase": firebase
  default: none

object_storage:
  type: str
  choices:
    "None": none
    "S3-compatible": s3
  default: none

# A shared UI design-system package is intentionally NOT scaffolded. The
# frontend ships a handful of local widgets in frontend/lib/widgets; extract a
# real shared_ui package into its own repo once a second app needs it.

# ─── Tooling (always-on, opt-out) ────────────────────────────────────────────
agent_tooling:
  type: bool
  help: Include CLAUDE.md / AGENTS.md / doc-drift / fitness checks
  default: true

# observability is intentionally NOT a flag — always generated with a no-op
# exporter by default; configure a real endpoint via config yaml.
