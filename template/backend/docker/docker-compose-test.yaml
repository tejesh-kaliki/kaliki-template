services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
      POSTGRES_DB: test_db
    ports:
      - "25432:5432"
    command: >
      postgres -c max_connections=1000 -c shared_buffers=128MB
    tmpfs:
      - /var/lib/postgresql/data
